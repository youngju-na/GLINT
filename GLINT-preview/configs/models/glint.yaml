# Default config for Glint
runner_cfg:
    visualizer_cfg:
        types: ['RENDER', 'DEPTH', 'ALPHA', 'NORMAL', 'SURFACE_NORMAL',
                'SPECULAR', 'ROUGHNESS', 'DIFFUSE', 'REFLECTION', 'TRANS_REFLECTION', 'TRANSPARENCY', 'TRANSMISSION', 'ENV_RENDER', 'TRANS_ENV_RENDER', 'TRANS_DEPTH', 'TRANS_NORMAL', 'OPAQUE']
    optimizer_cfg:
        lr: 0.05 # add default lr to params of other modules
        eps: 1.e-15
        lr_table:
            _xyz: 0.00016
            _features_dc: 0.0025
            _features_rest: 0.000125
            _opacity: 0.05
            _scaling: 0.005
            _rotation: 0.001
            _specular: 0.01
    scheduler_cfg:
        type: NoopLR
    epochs: 120
    ep_iter: 500
    save_latest_ep: 10
    save_ep: 120 #! 80
    eval_ep: 10 #! 10
    debug_mode: False #! False 
    log_interval: 1
    record_images_to_tb: True # save disk space

model_cfg:
    chunkify_rays: False # for now, no ray chunking for Gaussian
    let_user_handle_input: True # let the user handle the output and input
    network_cfg:
        type: NoopNetwork # no network for this
        _delete_: True
    renderer_cfg:
        type: NoopRenderer
    sampler_cfg:
        type: GlintSampler
        xyz_lr_scheduler: # same as the 2DGS code
            lr_init: 0.00016
            lr_final: 0.0000016
            lr_delay_mult: 0.01
            max_steps: 30000
        # Reflection
        render_reflection: True
        render_reflection_start_iter: 5000 #! 3000 but 0 only use for debugging 
        render_transmission_start_iter: 1000 #! 3000 but 0 only use for debugging
        # Base Gaussian
        sh_deg: 3
        sh_start_iter: 0
        specular_channels: 1
        densify_until_iter: 21000
        normal_prop_until_iter: 18000
        color_sabotage_until_iter: 18000 #! 18000
        prune_visibility: True
        min_weight_threshold: 0.1
        # Environment Gaussian
        use_optix_tracing: True
        use_trans_env_tracing: True #! True # whether to use optix tracing for transmission environment Gaussians
        acc_filtering_start_iter: -1
        specular_filtering_start_iter: -1 # do not use this
        env_sh_deg: 3
        env_sh_start_iter: 0
        env_densify_until_iter: 21000
        env_densification_interval: 500 #! 500
        env_opacity_reset_interval: 6000
        env_densify_grad_threshold: 0.0002 # / 2
        
        trans_env_densify_grad_threshold: 0.0002

        env_prune_visibility: True
        env_min_weight_threshold: 0.1
    supervisor_cfg:
        supervisor_cfgs:
            - type: VolumetricVideoSupervisor
            - type: GlintSupervisor
        img_loss_type: L1
        img_loss_weight: 0.8
        ssim_loss_weight: 0.2
        gs_dist_loss_weight: 0.0 # do not use this
        gs_norm_loss_weight: 0.1
        gs_norm_loss_start_iter: 0
        use_dpt_scale_gs_norm_loss: True
        ####################################### we add from here #######################################
        norm_loss_weight: 0.1 #! 0.01 # use monocular normal prior
        dpt_loss_weight: 0.2 # (new) use depth supervision

        use_dpt_patch_smooth_loss: True
        dpt_smooth_loss_start_iter: 0 #! 7000
        dpt_smooth_loss_weight: 0.005 #! 0.01
        dpt_smooth_loss_until_iter: 31000 #! 21000

        normal_cos_threshold_iter: 10000

        norm_smooth_loss_weight: 0.01 #! 0.01
        norm_smooth_loss_start_iter: 7000
        
        norm_loss_start_iter: 0 #! 500
        dpt_loss_start_iter: 0 #! 500
        norm_loss_until_iter: null #! 21000
        dpt_loss_until_iter: null #! 21000

        trans_env_densify_until_iter: 21000
        trans_env_densification_interval: 500 #! 500

        trans_map_reg_loss_weight: 0.02
        trans_reg_loss_start_iter: 7000 #! 7000

        rough_map_smooth_loss_weight: 0.0 #! 0.01
        rough_map_smooth_loss_start_iter: 7000

        
        plausibility_loss_weight: 0.02 #! 0.01 # use physical plausibility loss
        plausibility_loss_start_iter: 7000 #! 7000
        plausibility_loss_end_iter: null
        pp_loss_type: "lpips"

        trans_guidance_loss_weight: 0.05 #! 0.01 # use transmission guidance
        trans_guidance_loss_start_iter: 5000 #! 7000
        trans_guidance_loss_until_iter: null

        #! 
        albedo_threshold: 0.05 #! 0.1 # Threshold for low albedo
        basecolor_threshold: 0.25
        depth_discrepancy_threshold: 0.005 #! 0.1 #

        init_trans_in_stage2: False #! False # whether to initialize transmission Gaussians in stage 2
        
        trans_env_opacity_loss_start_iter: 7000 #! 7000
        trans_env_opacity_loss_type: 'l1' #! 'sparse' # use environment opacity loss
        trans_env_opacity_loss_weight: 0.001 #! 0.01 # use environment opacity loss
        trans_env_opacity_loss_until_iter: 31000 #! 21000 # until which iteration to apply the loss

        env_opacity_loss_start_iter: 7000 #! 7000
        env_opacity_loss_type: 'l1' #! 'sparse' # use environment opacity loss
        env_opacity_loss_weight: 0.0 #! 0.01 # use environment opacity loss
        env_opacity_loss_until_iter: 10000 #! 21000 # until which iteration to apply the loss

        pcd_opacity_loss_start_iter: 0 #! 7000
        pcd_opacity_loss_type: 'sparse' #! 'sparse' #
        pcd_opacity_loss_weight: 0.0 #! 0.01 # use point cloud density opacity loss
        pcd_opacity_loss_until_iter: 21000 #! 21000 # until which iteration to apply the loss
    
        multi_view_loss_weight: 1.0
        multi_view_start_iter: 7000 #! 7000
        multi_view_geo_weight: 0.03
        multi_view_ncc_weight: 0.15

        ###########################################################################################
        use_dpt_scale_norm_loss: True
        perc_loss_weight: 0.01 # use perceptual loss
        perc_loss_start_iter: 21000

dataloader_cfg: &dataloader_cfg
    dataset_cfg: &dataset_cfg
        n_rays: -1
        use_normals: False # use monocular normal prior
        use_sky_masks: False # use sky masks
        use_diffren: True # use diffusionrenderer priors
        use_neighbors: True
        diffren_params: ["normal", "depth", "diffuse_albedo", "basecolor"]
        # DiffusionRenderer prior path

    batch_sampler_cfg: &batch_sampler_cfg
        type: BatchSampler
        batch_size: 1

val_dataloader_cfg: # we see the term "dataloader" a one word?
    <<: *dataloader_cfg
    dataset_cfg:
        <<: *dataset_cfg
    batch_sampler_cfg:
        <<: *batch_sampler_cfg
