configs: configs/specs/orbit.yaml
val_dataloader_cfg:
    dataset_cfg:
        render_size: [-1, -1] # use original dataset resolution instead of forcing 1080p
        render_size_default: [-1, -1]
        interp_type: NONE # use pre-generated camera path as-is
        interp_cfg:
            smoothing_term: -1.0
        # Override these at runtime:
        # camera_path_intri: data/camera_paths/.../intri.yml
        # camera_path_extri: data/camera_paths/.../extri.yml
        # n_render_views: 120

dataloader_cfg:
    dataset_cfg:
        use_diffren: False # no diffusion renderer priors during novel view inference

runner_cfg:
    visualizer_cfg:
        store_video_output: True
        video_fps: 30
        types: ['RENDER', 'DEPTH', 'ALPHA', 'NORMAL', 'SURFACE_NORMAL',
                'SPECULAR', 'ROUGHNESS', 'DIFFUSE', 'REFLECTION', 'TRANS_REFLECTION',
                'TRANSPARENCY', 'TRANSMISSION', 'ENV_RENDER', 'TRANS_ENV_RENDER',
                'TRANS_DEPTH', 'TRANS_NORMAL', 'OPAQUE'] # exclude MESH for speed
