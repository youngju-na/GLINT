# Default config for GLINT
runner_cfg:
    visualizer_cfg:
        types: ['RENDER', 'DEPTH', 'ALPHA', 'NORMAL', 'SURFACE_NORMAL',
                'SPECULAR', 'ROUGHNESS', 'DIFFUSE', 'REFLECTION', 'TRANS_REFLECTION', 'TRANSPARENCY', 'TRANSMISSION', 'ENV_RENDER', 'TRANS_ENV_RENDER', 'TRANS_DEPTH', 'TRANS_NORMAL', 'OPAQUE', 'TRANS_GUIDANCE_ANGLE', 'TRANS_GUIDANCE_DEPTH', 'TRANS_GUIDANCE_WEIGHT', 'MESH']
    optimizer_cfg:
        lr: 0.05 # add default lr to params of other modules
        eps: 1.e-15
        lr_table:
            _xyz: 0.00016
            _features_dc: 0.0025
            _features_rest: 0.000125
            _opacity: 0.05
            _scaling: 0.005
            _rotation: 0.001
            _specular: 0.01
    scheduler_cfg:
        type: NoopLR
    epochs: 120
    ep_iter: 500
    save_latest_ep: 10
    save_ep: 80 #! 80
    eval_ep: 20 #! 10
    debug_mode: False #! False 
    log_interval: 10
    record_images_to_tb: True

model_cfg:
    chunkify_rays: False 
    let_user_handle_input: True 
    network_cfg:
        type: NoopNetwork # no network for this
        _delete_: True
    renderer_cfg:
        type: NoopRenderer
    sampler_cfg:
        type: GlintSampler
        xyz_lr_scheduler: # same as the 2DGS code
            lr_init: 0.00016
            lr_final: 0.0000016
            lr_delay_mult: 0.01
            max_steps: 30000
        # Reflection
        render_reflection: True
        render_reflection_start_iter: 3000 # you might wanna change this depending on datasets
        render_transmission_start_iter: 1000 # you might wanna change this depending on datasets
        # Base Gaussian
        sh_deg: 3
        sh_start_iter: 0
        specular_channels: 1
        densify_until_iter: 21000
        densify_grad_threshold: 0.0002
        normal_prop_until_iter: 18000
        color_sabotage_until_iter: 18000
        prune_visibility: True
        min_weight_threshold: 0.1
        # PCD (interface gaussian) freeze options
        pcd_freeze_enabled: False  # set True to freeze self.pcd after pcd_freeze_iter
        pcd_freeze_iter: 31000  # iteration after which self.pcd is frozen
        # Environment Gaussian
        use_optix_tracing: True
        use_trans_env_tracing: True 
        acc_filtering_start_iter: -1
        specular_filtering_start_iter: -1 # do not use this
        env_sh_deg: 3
        env_sh_start_iter: 0
        env_densify_until_iter: 21000
        env_densification_interval: 500 
        env_opacity_reset_interval: 6000
        env_densify_grad_threshold: 0.0002 
        
        trans_env_densify_until_iter: 21000
        trans_env_densification_interval: 500
        trans_env_densify_grad_threshold: 0.0002

        multi_view_every_n_iter: 10 # compute multi-view consistency every 3 iters
        env_prune_visibility: True
        env_min_weight_threshold: 0.1
    supervisor_cfg:
        supervisor_cfgs:
            - type: VolumetricVideoSupervisor
            - type: GlintSupervisor
        img_loss_type: L1
        img_loss_weight: 1.2
        ssim_loss_weight: 0.4
        gs_dist_loss_weight: 0.0 # do not use this
        gs_norm_loss_weight: 0.1
        gs_norm_loss_start_iter: 0
        use_dpt_scale_gs_norm_loss: True
        norm_loss_weight: 0.3 
        dpt_loss_weight: 0.1

        use_dpt_patch_smooth_loss: True
        dpt_smooth_loss_start_iter: 1000
        dpt_smooth_loss_weight: 0.0
        dpt_smooth_loss_until_iter: 31000

        normal_cos_threshold_iter: 10000
        use_normal_type: "diffren" # "diffren" or "stable" # which normal type to use for normal supervision

        use_intrinsics_guided_masks: True # whether to use intrinsics guided masks for transmission supervision

        norm_smooth_loss_weight: 0.05
        norm_smooth_loss_start_iter: 5000
        
        norm_loss_start_iter: 0 
        dpt_loss_start_iter: 0 
        norm_loss_until_iter: null 
        dpt_loss_until_iter: null 

        trans_map_reg_loss_weight: 0.01 
        trans_reg_loss_start_iter: 7000 
        use_view_depth_aware_trans_guidance_weighting: True
        trans_angle_soft_start_deg: 70.0
        trans_angle_hard_cutoff_deg: 80.0
        trans_guidance_far_depth_quantile: 1.0
        use_opaque_explainability_trans_guidance_gating: True
        trans_opaque_explainability_gating_start_iter: null
        trans_opaque_explainability_patch_size: 5
        trans_opaque_explainability_threshold: 0.02
        trans_opaque_explainability_sharpness: 0.01
        trans_opaque_explainability_min_weight: 0.1

        rough_map_smooth_loss_weight: 0.0 #! 0.01
        rough_map_smooth_loss_start_iter: 7000

        use_base_tracing: False

        plausibility_loss_weight: 0.05 # use physical plausibility loss
        plausibility_loss_start_iter: 5000
        plausibility_loss_end_iter: null
        pp_loss_type: "lpips"

        trans_guidance_loss_weight: 0.01 # use transmission guidance
        trans_guidance_loss_start_iter: 5000 # 7000
        trans_guidance_loss_until_iter: null

        albedo_threshold: 0.05 # Threshold for low albedo
        basecolor_threshold: 0.25 # (optional diffusion renderer guidance for removing black colored background) 
        depth_discrepancy_threshold: 0.005 # might wanna change this depending on the scene scale

        init_trans_in_stage2: False # whether to initialize transmission Gaussians in stage 2

        trans_env_opacity_loss_start_iter: 7000 
        trans_env_opacity_loss_type: 'l1' # 'sparse' # use environment opacity loss
        trans_env_opacity_loss_weight: 0.01 # 0.01 # use environment opacity loss
        trans_env_opacity_loss_until_iter: 31000 # 21000 # until which iteration to apply the loss

        multi_view_loss_weight: 0.01
        multi_view_start_iter: 10000 
        multi_view_until_iter: 21000
        multi_view_geo_weight: 0.03
        multi_view_ncc_weight: 0.15

        use_dpt_scale_norm_loss: True
        perc_loss_weight: 0.05 # use perceptual loss
        perc_loss_start_iter: 15000
        perc_loss_every_n_iter: 1 # compute LPIPS every 5 iters to save ~80% VGG overhead

dataloader_cfg: &dataloader_cfg
    dataset_cfg: &dataset_cfg
        n_rays: -1
        use_normals: True # use monocular normal prior
        use_sky_masks: False # use sky masks
        use_diffren: True # use diffusionrenderer priors
        use_neighbors: True
        diffren_params: ["normal", "depth", "diffuse_albedo", "basecolor"]
        # DiffusionRenderer prior path

    batch_sampler_cfg: &batch_sampler_cfg
        type: BatchSampler
        batch_size: 1

val_dataloader_cfg: # we see the term "dataloader" a one word?
    <<: *dataloader_cfg
    dataset_cfg:
        <<: *dataset_cfg
    batch_sampler_cfg:
        <<: *batch_sampler_cfg
